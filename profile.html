<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUXURY - Профил</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative; /* Нужно за абсолютното позициониране на планетата */
        }

        /* --- Езиково меню (Планета) --- */
        .lang-switcher {
            position: absolute;
            top: 2rem;
            right: 2.5rem;
            cursor: pointer;
            z-index: 1000;
        }

        .lang-switcher svg {
            color: #fff;
            transition: color 0.3s;
        }

        .lang-switcher:hover svg {
            color: #aaa;
        }

        .lang-menu {
            display: none;
            position: absolute;
            top: 35px;
            right: 0;
            background-color: #1a1a1a;
            list-style: none;
            padding: 10px 0;
            margin: 0;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 140px;
            font-family: 'Playfair Display', serif; /* Шрифт като на снимките ти */
        }

        .lang-menu.show {
            display: block;
        }

        .lang-menu li {
            padding: 10px 20px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .lang-menu li:hover {
            background-color: #333;
        }
        /* ------------------------------- */

        .logo-header {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            color: #ffffff;
            text-decoration: none;
        }

        .profile-box {
            background-color: #222222;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .profile-box h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 2.5rem;
            font-weight: normal;
            letter-spacing: 2px;
        }

        .info-group {
            margin-bottom: 1.8rem;
        }

        .info-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
            display: block;
        }

        .info-value {
            font-size: 1rem;
            color: #fff;
            border-bottom: 1px solid #444;
            padding-bottom: 0.8rem;
            word-break: break-all;
        }

        .pass-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid #fff;
            padding-bottom: 2px;
            transition: color 0.3s, border-color 0.3s;
        }

        .pass-link:hover {
            color: #aaa;
            border-color: #aaa;
        }

        .logout-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 2rem;
            background-color: #fff;
            color: #000;
            border: none;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .logout-btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        .back-link {
            margin-top: 2rem;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
            animation: fadeIn 1s ease-in-out 0.5s forwards;
            opacity: 0;
        }

        .back-link:hover {
            color: #fff;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Скриваме досадния банер на Google горе */
        .skiptranslate, .goog-te-banner-frame { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body>

    <div class="lang-switcher" onclick="toggleLangMenu(event)">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <ul id="customLangMenu" class="lang-menu">
            <li onclick="doTranslate('bg')">Български</li>
            <li onclick="doTranslate('en')">English</li>
            <li onclick="doTranslate('fr')">Français</li>
            <li onclick="doTranslate('es')">Español</li>
            <li onclick="doTranslate('de')">Deutsch</li>
            <li onclick="doTranslate('ru')">Русский</li>
            <li onclick="doTranslate('zh-CN')">中文</li>
            <li onclick="doTranslate('ja')">日本語</li>
        </ul>
    </div>

    <div id="google_translate_element" style="display:none;"></div>

    <a href="index.html" class="logo-header">JUXURY</a>

    <div class="profile-box">
        <h2>ДАННИ ЗА ДОСТЪП</h2>
        
        <div class="info-group">
            <span class="info-label">Имейл</span>
            <div class="info-value">victoriachernilova26@itpg-varna.bg</div>
        </div>

        <div class="info-group">
            <span class="info-label">Парола</span>
            <div style="margin-top: 10px;">
                <a href="#" class="pass-link">Смяна на парола</a>
            </div>
        </div>

        <button onclick="logoutUser()" class="logout-btn">
            ИЗХОД 
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>
    </div>

    <a href="index.html" class="back-link">&larr; Обратно към началото</a>

    <script>
        // Изход от профила
        function logoutUser() {
            localStorage.removeItem('juxury_logged_in');
            window.location.href = 'login.html';
        }

        // Показване/Скриване на езиковото меню
        function toggleLangMenu(event) {
            event.stopPropagation();
            document.getElementById('customLangMenu').classList.toggle('show');
        }

        // Затваряне на менюто при клик извън него
        window.onclick = function(event) {
            var menu = document.getElementById('customLangMenu');
            if (menu && menu.classList.contains('show')) {
                menu.classList.remove('show');
            }
        }

        // Инициализация на Google Translate
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'bg',
                includedLanguages: 'en,fr,es,ru,de,zh-CN,ja',
                autoDisplay: false
            }, 'google_translate_element');
        }

        // Функцията ни за превод
        function doTranslate(langCode) {
            var menu = document.getElementById('customLangMenu');
            if (menu) menu.classList.remove('show');

            if (langCode === 'bg') {
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=" + window.location.hostname + "; path=/;";
                window.location.reload();
                return;
            }

            var select = document.querySelector('.goog-te-combo');
            if (select) {
                select.value = langCode;
                select.dispatchEvent(new Event('change'));
            } else {
                document.cookie = "googtrans=/bg/" + langCode + "; path=/;";
                document.cookie = "googtrans=/bg/" + langCode + "; domain=" + window.location.hostname + "; path=/;";
                window.location.reload();
            }
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
